name: toll.architect

services:
  lane.db.postgresql:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: laneSecurePassword
      POSTGRES_DB: lane
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=es-US"
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_lane:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d lane" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data_lane:
