<div class="login-wrapper">
  <p-card styleClass="login-card">
    <ng-template pTemplate="header">
      <div class="login-header">
        <span class="login-logo">⬡</span>
        <h2>Toll Architect</h2>
        <p class="login-subtitle">Acceso de Operador de Carril</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          pInputText
          formControlName="username"
          placeholder="Ingrese su usuario"
          [class.ng-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
          autocomplete="username"
        />
        @if (form.get('username')?.invalid && form.get('username')?.touched) {
          <small class="error-hint">El usuario es requerido</small>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          inputId="password"
          formControlName="password"
          placeholder="Ingrese su contraseña"
          [feedback]="false"
          [toggleMask]="true"
          [class.ng-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          autocomplete="current-password"
          styleClass="w-full"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <small class="error-hint">La contraseña es requerida</small>
        }
      </div>

      @if (errorMsg()) {
        <p-message severity="error" [text]="errorMsg()" styleClass="w-full" />
      }

      <p-button
        type="submit"
        label="Ingresar"
        [loading]="loading()"
        [disabled]="form.invalid || loading()"
        styleClass="w-full mt-2"
        icon="pi pi-sign-in"
      />
    </form>
  </p-card>
</div>
